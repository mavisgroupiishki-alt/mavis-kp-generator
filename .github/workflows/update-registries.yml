name: Update Registries

# Запускается:
# 1) По расписанию — каждый день в 00:00 UTC (03:00 по Минску)
# 2) Вручную через интерфейс GitHub (вкладка Actions → Run workflow)
# 3) При push изменений в scripts/ или сам workflow
on:
  schedule:
    - cron: "0 0 * * *"  # 00:00 UTC ежедневно = 03:00 МСК
  workflow_dispatch:      # ручной запуск
  push:
    paths:
      - 'scripts/**'
      - '.github/workflows/update-registries.yml'

permissions:
  contents: write  # нужно, чтобы Action мог коммитить в репозиторий

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Установка зависимостей
        run: |
          pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Парсинг СПК (bsc.by)
        run: python scripts/parse_spk.py
        continue-on-error: true  # если упало — не валим весь workflow

      - name: Парсинг ОСП (stn.by)
        run: python scripts/parse_osp.py
        continue-on-error: true

      - name: Показать что получилось
        run: |
          echo "=== Содержимое папки data ==="
          ls -la data/ || echo "Папка data пуста"
          echo ""
          echo "=== Размер JSON-файлов ==="
          du -h data/*.json 2>/dev/null || echo "Нет JSON"
          echo ""
          echo "=== Превью SPK ==="
          head -50 data/spk.json 2>/dev/null || echo "spk.json не создан"
          echo ""
          echo "=== Превью OSP ==="
          head -50 data/osp.json 2>/dev/null || echo "osp.json не создан"

      - name: Коммит обновлений в репозиторий
        run: |
          git config user.name "MAVIS Registry Bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Нет изменений для коммита"
          else
            git commit -m "Auto-update registries: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "✓ Изменения закоммичены"
          fi
