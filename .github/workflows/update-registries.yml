name: Update Registries

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    paths:
      - 'scripts/**'
      - '.github/workflows/update-registries.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Установка зависимостей
        run: |
          pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Парсинг СПК старый (bsc.by)
        run: python scripts/parse_spk.py
        continue-on-error: true

      - name: Парсинг СПК новый (spk.bsc.by)
        run: python scripts/parse_spk2.py
        continue-on-error: true

      - name: Парсинг ОСП (stn.by)
        run: python scripts/parse_osp.py
        continue-on-error: true

      - name: Парсинг Аттестатов юр.лиц (att.bsc.by)
        run: python scripts/parse_att.py
        continue-on-error: true

      - name: Парсинг ОТМЕНЁННЫХ Аттестатов (att.bsc.by/reestrnone)
        run: python scripts/parse_attoff.py
        continue-on-error: true

      - name: Парсинг Аттестатов специалистов (rcuk.bsc.by)
        run: python scripts/parse_spec.py
        continue-on-error: true

      - name: Парсинг ISO/СУОТ (tsouz.belgiss.by)
        run: python scripts/parse_iso.py
        continue-on-error: true

      - name: Показать что получилось
        run: |
          echo "=== Содержимое папки data ==="
          ls -la data/ || echo "Папка data пуста"
          echo ""
          echo "=== Размер JSON-файлов ==="
          for f in data/*.json; do
            if [ -f "$f" ]; then
              count=$(python3 -c "import json; print(json.load(open('$f')).get('count', 0))" 2>/dev/null || echo "?")
              size=$(stat -c%s "$f")
              echo "$f - count: $count, size: $size bytes"
            fi
          done

      - name: Коммит обновлений в репозиторий
        run: |
          git config user.name "MAVIS Registry Bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Нет изменений для коммита"
          else
            git commit -m "Auto-update registries: $(date -u +'%Y-%m-%d %H:%M UTC')"
            # Пробуем запушить с несколькими попытками — если за время работы
            # workflow в репо появились новые коммиты, делаем rebase и пробуем снова
            for i in 1 2 3 4 5; do
              if git push; then
                echo "✓ Изменения закоммичены с попытки $i"
                exit 0
              fi
              echo "Попытка $i не удалась, делаем git pull --rebase и пробуем снова..."
              git pull --rebase origin main || git pull --rebase origin master || true
              sleep 2
            done
            echo "✗ Не удалось запушить за 5 попыток"
            exit 1
          fi
