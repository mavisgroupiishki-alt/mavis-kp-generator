  const pBx=async c=>{setCo(p=>({...p,name:c.name,email:c.email||p.email,phone:c.phone||p.phone,bx:c.id}));setBr([]);setBq("");try{const r=await fetch(BX+"/crm.contact.list.json?filter[COMPANY_ID]="+c.id+"&select[]=NAME&select[]=LAST_NAME&select[]=SECOND_NAME");const d=await r.json();if(d.result?.[0]){const t=d.result[0];const f=[t.LAST_NAME,t.NAME,t.SECOND_NAME].filter(Boolean).join(" ");if(f)setCo(p=>({...p,dir:f}))}}catch(e){}fl("«"+c.name+"» загружена")};

  // Email body

    await new Promise(r=>setTimeout(r,600));
    const canvas=await html2canvas(clone,{scale:3,useCORS:true,backgroundColor:"#faf6ec",logging:false,width:794});
    document.body.removeChild(wrap);
    const{jsPDF}=window.jspdf;
    const pxW=canvas.width,pxH=canvas.height,pageW=210,pageH=297,ratio=pageW/pxW,pagePxH=Math.floor(pageH/ratio);
    const totalMmH=pxH*ratio;
    const pdf=new jsPDF("p","mm","a4");
    pdf.setFillColor(250,246,236);pdf.rect(0,0,pageW,pageH,"F");
    if(totalMmH<=pageH*1.3){
      const fitH=Math.min(totalMmH,pageH);const fitW=(fitH/totalMmH)*pageW;const offsetX=(pageW-fitW)/2;
      pdf.addImage(canvas.toDataURL("image/png"),"PNG",offsetX,0,fitW,fitH);
    }else{
      let page=0,srcY=0;
      while(srcY<pxH&&page<10){
        if(page>0){pdf.addPage();pdf.setFillColor(250,246,236);pdf.rect(0,0,pageW,pageH,"F");}
        const sliceH=Math.min(pagePxH,pxH-srcY);const pc=document.createElement("canvas");
        pc.width=pxW;pc.height=sliceH;pc.getContext("2d").drawImage(canvas,0,srcY,pxW,sliceH,0,0,pxW,sliceH);
        pdf.addImage(pc.toDataURL("image/png"),"PNG",0,0,pageW,sliceH*ratio);

      }

    return pdf.output("datauristring").split(",")[1];
  };

    const sEm=async()=>{

      }

                {sv.map((s,i)=><tr key={s.id}><td style={{color:"var(--t2)"}}>{i+1}</td><td><input className="FI" style={{width:"100%",background:"transparent",border:"none",padding:0,fontSize:13,color:"var(--tx)"}} value={s.cn||s.n} onChange={e=>uS(s.id,"cn",e.target.value)} /></td><td><input type="number" className="NI2" value={s.prep} onChange={e=>uS(s.id,"prep",+e.target.value)} /></td><td><input type="number" className="NI2" value={s.fee} onChange={e=>uS(s.id,"fee",+e.target.value)} /></td><td><input type="number" className="NI2" value={s.extra} onChange={e=>uS(s.id,"extra",+e.target.value)} /><input className="CIp" placeholder="Комментарий..." value={s.ec||""} onChange={e=>uS(s.id,"ec",e.target.value)} /></td><td><button className="B BR Bsm" onClick={()=>rS(s.id)}>✕</button></td></tr>)}
                <tr className="TR"><td></td><td style={{textAlign:"right"}}>Итого:</td><td>{fm(tP)}</td><td>{fm(tF)}</td><td>{fm(tE)}</td><td></td></tr>
                <tr className="GR"><td></td><td style={{textAlign:"right"}}>ОБЩАЯ СУММА:</td><td colSpan={3}>{fm(tT)}</td><td></td></tr>
              </tbody></table></div></div>}
              {sv.find(s=>s.spk||s.att)&&<div className="CD">
                <div className="CT">📋 Виды работ {sv.find(s=>s.spk)&&sv.find(s=>s.att)?"для СПК / Аттестации":sv.find(s=>s.spk)?"для СПК":"для Аттестации"}</div>
                <div style={{display:"flex",gap:10,marginBottom:12}}>
                  <button className="B BP" onClick={()=>setShowWorkPicker(!showWorkPicker)}>{showWorkPicker?"Скрыть каталог":"📂 Выбрать из каталога"}</button>
                  <input className="FI" style={{flex:1}} placeholder="Или впишите свой вид работ..." value={customWork} onChange={e=>setCustomWork(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&customWork.trim()){setWorkTypes(p=>[...p,{code:"",name:customWork.trim(),custom:true}]);setCustomWork("")}}} />

                </div>
                {showWorkPicker&&<div style={{background:"var(--s2)",borderRadius:8,padding:"12px",maxHeight:400,overflowY:"auto",marginBottom:12}}>
                  <input className="FI" style={{width:"100%",marginBottom:10}} placeholder="🔍 Поиск..." value={workSearch} onChange={e=>setWorkSearch(e.target.value)} />

                    const added=workTypes.find(x=>x.code===w.code);
                    return <div key={w.code} onClick={()=>{if(added){setWorkTypes(p=>p.filter(x=>x.code!==w.code))}else{setWorkTypes(p=>[...p,{code:w.code,name:w.name}])}}} style={{padding:"8px 12px",borderRadius:6,cursor:"pointer",fontSize:13,display:"flex",gap:10,alignItems:"flex-start",background:added?"rgba(52,199,123,.1)":"transparent",marginBottom:2}}>
                      <span style={{fontSize:16,flexShrink:0,color:added?"var(--gn)":"var(--t2)",marginTop:-2}}>{added?"✓":"☐"}</span>
                      <span style={{fontWeight:700,color:"var(--ac)",minWidth:40}}>{w.code}</span>
                      <span style={{flex:1}}>{w.name}</span>
                    </div>;
                  })}
                </div>}
                {workTypes.length>0&&<div style={{background:"var(--bg)",border:"1px solid var(--bd)",borderRadius:8,padding:"12px 16px"}}>
                  <div style={{fontSize:12,color:"var(--t2)",marginBottom:8,fontWeight:600}}>Выбрано ({workTypes.length}):</div>
                  {workTypes.map((w,i)=><div key={i} style={{display:"flex",gap:8,padding:"6px 0",fontSize:13,alignItems:"flex-start",borderBottom:i<workTypes.length-1?"1px solid var(--bd)":"none"}}>
                    {w.code&&<span style={{color:"var(--ac)",fontWeight:700,minWidth:40}}>{w.code}</span>}
                    <span style={{flex:1}}>{w.name}</span>
                    <button className="B BR Bsm" style={{padding:"2px 8px",fontSize:11}} onClick={()=>setWorkTypes(p=>p.filter((_,j)=>j!==i))}>✕</button>
                  </div>)}
                </div>}
                {autoSI.length>0&&<div style={{marginTop:12,padding:"12px 16px",background:"rgba(79,125,245,.08)",borderRadius:8,border:"1px solid rgba(79,125,245,.2)"}}>
                  <div style={{fontSize:12,color:"var(--ac)",marginBottom:6,fontWeight:700}}>🔧 Автоматически подобранные СИ ({autoSI.length}):</div>
                  <div style={{fontSize:12,color:"var(--tx)",lineHeight:1.7}}>{autoSI.join(" · ")}</div>
                </div>}
                {(autoSPEC.spk.length>0||autoSPEC.att.length>0)&&<div style={{marginTop:12,padding:"12px 16px",background:"rgba(52,199,123,.08)",borderRadius:8,border:"1px solid rgba(52,199,123,.2)"}}>
                  <div style={{fontSize:12,color:"var(--gn)",marginBottom:8,fontWeight:700}}>👷 Необходимые специалисты:</div>
                  {autoSPEC.spk.length>0&&<div style={{marginBottom:autoSPEC.att.length?8:0}}>
                    <div style={{fontSize:11,color:"var(--t2)",marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:.5}}>Для свидетельства о тех. компетентности:</div>
                    <div style={{fontSize:12,color:"var(--tx)",lineHeight:1.7}}>{autoSPEC.spk.map((s,i)=><div key={i}>• {s}</div>)}</div>
                  </div>}
                  {autoSPEC.att.length>0&&<div>
                    <div style={{fontSize:11,color:"var(--t2)",marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:.5}}>Для аттестата соответствия:</div>
                    <div style={{fontSize:12,color:"var(--tx)",lineHeight:1.7}}>{autoSPEC.att.map((s,i)=><div key={i}>• {s}</div>)}</div>
                  </div>}
                </div>}
              </div>}
              <div style={{display:"flex",justifyContent:"space-between"}}><button className="B BS Blg" onClick={()=>setSt(1)}>← Компания</button><button className="B BP Blg" onClick={()=>{if(!sv.length){fl("Добавьте услугу","error");return}setSt(3)}}>Предпросмотр →</button></div>
            </>)}
            {st===3&&(<>
              <div className="KP" ref={kpRef}>
                <div className="KY">2026</div>
                <div className="KH"><h1>КОММЕРЧЕСКОЕ</h1><h2>ПРЕДЛОЖЕНИЕ</h2><div className="br2">MAVIS GROUP</div></div>
                <div className="KD">Предложение о сотрудничестве от {kpDate}</div>
                <div className="KC"><h3>{co.name}</h3>{co.dir&&<p>{co.dir}</p>}</div>
                {workTypes.length>0&&<div style={{marginLeft:60,marginBottom:24,padding:"16px 20px",background:"rgba(255,255,255,.6)",borderRadius:8,border:"1px solid rgba(100,100,100,.2)"}}>
                  <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:"#3a2e1a"}}>Виды работ:</div>
                  <div style={{fontSize:11,color:"#5a4528",lineHeight:1.7}}>
                    {workTypes.map((w,i)=><span key={i}>{w.code&&<strong style={{color:"#8b5a1e",fontWeight:700}}>{w.code}</strong>} {w.name}{i<workTypes.length-1?"; ":""}</span>)}
                  </div>
                  {autoSI.length>0&&<div style={{marginTop:12,paddingTop:12,borderTop:"1px solid rgba(100,100,100,.2)"}}>
                    <div style={{fontSize:12,fontWeight:700,marginBottom:6,color:"#3a2e1a"}}>Перечень необходимых СИ:</div>
                    <div style={{fontSize:10,color:"#6b5535",lineHeight:1.6}}>{autoSI.join(" · ")}</div>
                  </div>}
                </div>}
                {ttl&&<div className="KS">{ttl}</div>}
                <table className="KT"><thead><tr><th>№</th><th>Услуга</th><th>Подготовка</th><th>Пошлины</th><th>Доп. расходы</th></tr></thead><tbody>
                  {sv.map((s,i)=><tr key={s.id}><td style={{color:"#777"}}>{i+1}</td><td>{s.cn||s.n}</td><td>{fm(s.prep)}</td><td>{fm(s.fee)}</td><td>{fm(s.extra)}{s.ec&&<div style={{fontSize:11,color:"#777",marginTop:2}}>{s.ec}</div>}</td></tr>)}
                  <tr className="TT"><td></td><td>Итого:</td><td>{fm(tP)}</td><td>{fm(tF)}</td><td>{fm(tE)}</td></tr>
                  <tr className="TG"><td></td><td>ОБЩАЯ СУММА:</td><td colSpan={3}>{fm(tT)}</td></tr>
                </tbody></table>
                {autoSI.length>0&&<div style={{marginLeft:60,marginRight:0,marginBottom:32,border:"1px solid rgba(100,100,100,.3)",borderRadius:4}}>
                  <div style={{background:"rgba(100,100,100,.12)",padding:"10px 16px",fontWeight:700,fontSize:14,color:"#333",textAlign:"center",borderBottom:"1px solid rgba(100,100,100,.25)"}}>Перечень необходимого оборудования</div>
                  <div style={{padding:"14px 20px",fontSize:12,color:"#333",lineHeight:2}}>
                    {autoSI.map((s,i)=><div key={i}>— {s};</div>)}
                  </div>
                </div>}
                <div className="KCN"><strong>Условия сотрудничества:</strong><br/>— 100% предоплата до начала выполнения работ.<br/>— Гос. пошлина — по мере направления документов.</div>
                <div className="KS">Преимущества работы с нами</div>
                <div className="KA">{ADV.map((a,i)=><div key={i} className="KAI"><h4><span style={{color:"#8b5a1e"}}>◆</span> {a.t}</h4><p>{a.d}</p></div>)}</div>
                <div className="KCL">{CL.map(c=><span key={c} className="KCLT">{c}</span>)}</div>
                {mgrData?.name&&<div style={{marginLeft:60,marginTop:32,paddingTop:20,borderTop:"1px solid rgba(100,100,100,.25)"}}><div style={{fontSize:16,fontWeight:700,color:"#333",marginBottom:4}}>{mgrData.name}</div><div style={{fontSize:12,color:"#555",marginBottom:2}}>MAVIS GROUP | Специалист отдела продаж</div>{mgrData.phone&&<div style={{fontSize:12,color:"#777"}}>{mgrData.phone}</div>}<div style={{fontSize:12,color:"#777"}}>mavis.group@mail.ru</div></div>}
              </div>
              <div className="AB">
                <button className="B BS Blg" onClick={()=>setSt(2)}>← Редактировать</button>
                <button className="B BG Blg" onClick={save}>💾 Сохранить</button>
                <button className="B BP Blg" onClick={sEm} disabled={sn}>{sn?"⏳ Отправка...":"✉ Отправить письмо"}</button>
                <button className="B BS Blg" onClick={dlPdf} disabled={pdfing}>{pdfing?"⏳":"📄 Скачать PDF"}</button>
              </div>
            </>)}
          </div>
        </>)}
        {pg==="history"&&(<><div className="MH"><h2>История КП</h2></div><div className="MC">
            <div style={{display:"flex",gap:0,marginBottom:20,borderBottom:"1px solid var(--bd)"}}>
              {[{id:"all",label:"Все"},...INIT_MGRS.map(m=>({id:String(m.id),label:m.name.split(" ")[0]}))].map(tab=><div key={tab.id} onClick={()=>setHistTab(tab.id)} style={{padding:"10px 20px",fontSize:13,fontWeight:600,cursor:"pointer",borderBottom:histTab===tab.id?"2px solid var(--ac)":"2px solid transparent",color:histTab===tab.id?"var(--ac)":"var(--t2)",marginBottom:-1}}>{tab.label}</div>)}
            </div>
            <div style={{marginBottom:16}}><input className="FI" style={{width:"100%"}} placeholder="Поиск по компании..." value={histQ} onChange={e=>setHistQ(e.target.value)} /></div>
            {(()=>{let f=hi;if(histTab!=="all")f=f.filter(k=>{const m=INIT_MGRS.find(x=>x.name===k.mgr);return m&&String(m.id)===histTab});if(histQ.trim())f=f.filter(k=>k.co.name.toLowerCase().includes(histQ.toLowerCase()));if(!f.length)return <div className="ES"><p style={{fontSize:14}}>{hi.length?"Ничего не найдено":"Пока нет КП"}</p>{!hi.length&&<button className="B BP" style={{marginTop:20}} onClick={nw}>+ Создать</button>}</div>;return f.map(k=><div key={k.id} className="HC" onClick={()=>ld(k)}><div><div style={{fontSize:12,color:"var(--ac)",fontWeight:700}}>{k.kn}</div><div style={{fontSize:15,fontWeight:700}}>{k.co.name}</div><div style={{fontSize:12,color:"var(--t2)"}}>{k.date}{k.mgr&&" · "+k.mgr}</div></div><div style={{marginLeft:"auto",fontSize:16,fontWeight:800,color:"var(--gn)",whiteSpace:"nowrap"}}>{fm(k.tT)}</div></div>)})()}
          </div></>)}
        
        {pg==="settings"&&(<><div className="MH"><h2>Настройки</h2></div><div className="MC">
          <div className="CD"><div className="CT">🔗 Битрикс24</div><div style={{padding:"12px 16px",background:"var(--s2)",borderRadius:8,fontSize:13,color:"var(--gn)",fontWeight:600}}>✓ Подключён: mavisgroup.bitrix24.by</div></div>
          <div className="CD"><div className="CT">✉ Email</div><p style={{fontSize:13,color:"var(--t2)",lineHeight:1.6}}>Все КП отправляются с <strong style={{color:"var(--tx)"}}>{FROM_EMAIL}</strong>. Подпись выбранного менеджера подставляется автоматически.</p></div>
          <div className="CD"><div className="CT">👤 Менеджеры</div>
              {INIT_MGRS.map((m,i)=><div key={m.id} style={{padding:"12px 16px",background:"var(--s2)",borderRadius:8,marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontSize:14,fontWeight:700}}>{m.name}</span>
                <span style={{fontSize:12,color:"var(--t2)",marginLeft:"auto"}}>Специалист отдела продаж</span>
              </div>)}
              <div style={{marginTop:12,fontSize:12,color:"var(--t2)"}}>Менеджеры зашиты в приложение. Для изменения обратитесь к разработчику.</div>
            </div>
            <div className="CD"><div className="CT">✉ Отправка email</div>
              <div style={{padding:"12px 16px",background:"var(--s2)",borderRadius:8,fontSize:13}}>
                <span style={{color:"var(--gn)",fontWeight:600}}>Отправка с: </span>
                <span style={{color:"var(--tx)"}}>{FROM_EMAIL}</span>
              </div>
              <p style={{fontSize:12,color:"var(--t2)",marginTop:8,lineHeight:1.6}}>Все КП отправляются с общей почты. В подписи письма подставляется ФИО выбранного менеджера.</p>
            </div>
            <div className="CD"><div className="CT">📍 Реквизиты компании</div>
              <div className="FG">
                <div className="FGR"><span className="FL">Телефон</span><div style={{fontSize:14,color:"var(--tx)",padding:"10px 0"}}>{COMPANY_PHONE}</div></div>
                <div className="FGR"><span className="FL">Адрес</span><div style={{fontSize:14,color:"var(--tx)",padding:"10px 0"}}>{COMPANY_ADDR}</div></div>
              </div>
            </div>
        </div></>)}
      </div>
    </div>
  </>);
}
const root=ReactDOM.createRoot(document.getElementById('root'));root.render(React.createElement(App));
</script><script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(r=>console.log('SW registered')).catch(e=>console.log('SW error:',e));
  });
}
</script>
</body></html>
