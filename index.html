// ===== EditableField: inline-редактирование текста в превью =====
function EditableField({value,onChange,style,multiline,placeholder}){
const[editing,setEditing]=useState(false);
const[draft,setDraft]=useState(value||"");
const ref=useRef(null);
React.useEffect(()=>{setDraft(value||"")},[value]);
React.useEffect(()=>{if(editing&&ref.current){ref.current.focus();ref.current.select&&ref.current.select()}},[editing]);
const save=()=>{onChange(draft);setEditing(false)};
const cancel=()=>{setDraft(value||"");setEditing(false)};
const baseStyle={...style,cursor:"text",borderRadius:3,padding:"1px 3px",transition:"background .15s",position:"relative"};
if(editing){
if(multiline){
return <textarea ref={ref} value={draft} onChange={e=>setDraft(e.target.value)} onBlur={save} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();save()}else if(e.key==="Escape")cancel()}} style={{...baseStyle,background:"#fff8d5",border:"1px solid #d4a647",outline:"none",fontFamily:"inherit",fontSize:"inherit",fontWeight:"inherit",color:"inherit",width:"100%",minHeight:60,resize:"vertical",lineHeight:1.5}} />
}
return <input ref={ref} type="text" value={draft} onChange={e=>setDraft(e.target.value)} onBlur={save} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();save()}else if(e.key==="Escape")cancel()}} placeholder={placeholder} style={{...baseStyle,background:"#fff8d5",border:"1px solid #d4a647",outline:"none",fontFamily:"inherit",fontSize:"inherit",fontWeight:"inherit",color:"inherit",width:"100%"}} />
}
return <span onClick={()=>setEditing(true)} style={baseStyle} className="edt" title="Кликните, чтобы изменить">{value||<em style={{color:"#aaa"}}>{placeholder||"—"}</em>}</span>;
}

// === Компонент: просмотровщик базы реестров ===
function RegistryBrowser({localDb,loadLocalDb,dbLoading}){
const SOURCES=[
{id:"spk",label:"СПК",full:"Свидетельства о технической компетентности"},
{id:"osp",label:"ОСП",full:"Орган сварочного производства"},
{id:"att",label:"Аттестаты юр.лиц",full:"Аттестаты соответствия юр.лиц"},
{id:"spec",label:"Аттестаты спец.",full:"Квалификационные аттестаты специалистов"},
{id:"iso",label:"ISO / СУОТ",full:"Сертификаты систем менеджмента"},
];

// Активный реестр — первый у которого есть данные, либо spk
const firstAvailable=SOURCES.find(s=>localDb[s.id]&&localDb[s.id].count>0)?.id||"spk";
const[activeSrc,setActiveSrc]=useState(firstAvailable);
const[query,setQuery]=useState("");
const[page,setPage]=useState(0);
const[filter,setFilter]=useState("all"); // all | expired | expiring | active
const[sortBy,setSortBy]=useState("expiry"); // expiry | name | number

const PER_PAGE=50;

const db=localDb[activeSrc];

React.useEffect(()=>{setPage(0)},[activeSrc,query,filter,sortBy]);

const daysLeft=(iso)=>{if(!iso)return null;const d=new Date(iso);return Math.ceil((d-new Date())/(1000*60*60*24))};

// Фильтрация и сортировка
const filtered=React.useMemo(()=>{
if(!db||!db.records)return [];
const q=query.toLowerCase().trim();
let result=db.records.filter(r=>{
// Текстовый фильтр
if(q){
const t=((r.organization||"")+" "+(r.cert_number||"")+" "+(r.person||"")+" "+(r.activity||"")).toLowerCase();
if(!t.includes(q))return false;
}
// Фильтр по статусу
if(filter!=="all"){
const dl=daysLeft(r.expiry_date);
if(filter==="expired"&&!(dl!==null&&dl<0))return false;
if(filter==="expiring"&&!(dl!==null&&dl>=0&&dl<=60))return false;
if(filter==="active"&&!(dl===null||dl>60))return false;
}
return true;
});
// Сортировка
if(sortBy==="expiry"){
result.sort((a,b)=>{
const da=a.expiry_date?new Date(a.expiry_date).getTime():Infinity;
const dbb=b.expiry_date?new Date(b.expiry_date).getTime():Infinity;
return da-dbb;
});
}else if(sortBy==="name"){
result.sort((a,b)=>(a.organization||a.person||"").localeCompare(b.organization||b.person||"","ru"));
}else if(sortBy==="number"){
result.sort((a,b)=>(a.cert_number||"").localeCompare(b.cert_number||""));
}
return result;
},[db,query,filter,sortBy]);

const totalPages=Math.ceil(filtered.length/PER_PAGE);
const pageData=filtered.slice(page*PER_PAGE,(page+1)*PER_PAGE);

// Подсчёт статусов для бейджей в кнопках фильтра
const counts=React.useMemo(()=>{
if(!db||!db.records)return{all:0,expired:0,expiring:0,active:0};
let exp=0,expr=0,act=0;
for(const r of db.records){
const dl=daysLeft(r.expiry_date);
if(dl===null||dl>60)act++;
else if(dl<0)exp++;
else expr++;
}
return{all:db.records.length,expired:exp,expiring:expr,active:act};
},[db]);

// Экспорт в CSV
const exportCsv=()=>{
if(filtered.length===0)return;
const header=["Номер","Организация / ФИО","Вид деятельности","Дата выдачи","Последняя оценка","Действует до","Статус"];
const rows=filtered.map(r=>{
const dl=daysLeft(r.expiry_date);
let status="—";
if(dl!==null){if(dl<0)status="Истёк "+(-dl)+" дн. назад";else if(dl<=60)status="Истечёт через "+dl+" дн.";else status="Действует";}
return[r.cert_number||"",r.organization||r.person||"",r.activity||r.specialization||"",r.issue_date||"",r.last_check_date||"",r.expiry_date||"",status];
});
const csv=[header,...rows].map(row=>row.map(c=>{const s=String(c);return /[,"\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s}).join(",")).join("\r\n");
const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});
const url=URL.createObjectURL(blob);
const a=document.createElement("a");
a.href=url;
a.download=`mavis_${activeSrc}_${new Date().toISOString().slice(0,10)}.csv`;
a.click();
setTimeout(()=>URL.revokeObjectURL(url),1000);
};

return <>
<div className="MH"><h2>Реестры — просмотр базы</h2></div>
<div className="MC">

{/* Переключатель реестров */}
<div className="CD" style={{padding:"10px"}}>
<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
{SOURCES.map(s=>{
const cnt=localDb[s.id]?.count||0;

{s.label} <span style={{opacity:.7,marginLeft:4,fontWeight:400}}>({cnt})</span>
</button>;
})}
</div>
{activeSrc==="osp"&&<div style={{marginTop:8,padding:"8px 10px",background:"rgba(80,150,255,.08)",borderRadius:6,fontSize:11,color:"var(--t2)",lineHeight:1.5}}>

<p style={{color:"var(--t2)",marginBottom:14}}>База этого реестра ещё не загружена</p>

<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
{[

// Расшифровка оснований прекращения аттестатов (att.bsc.by/reestrnone)
// Используется для подсказок менеджеру что предложить клиенту
// ВНИМАНИЕ: тексты расшифровок предоставлены пользователем, точность проверена пользователем.
// Если ваш реальный текст основания не подходит ни под одну строку — добавьте новую.
const ATTOFF_REASON_DECODER=[
// === Кодекс об архитектурной деятельности (новые формулировки) ===
{match:/п\.?\s*10\s*ст\.?\s*33/i,title:"Не подали ежегодные сведения в декабре",advice:"Можно восстановить через подачу заявления",severity:"normal"},
{match:/п\.?\s*11\s*ст\.?\s*33/i,title:"Утрата соответствия критериям (уволили ГИПа/прорабов)",advice:"Нужно восстановить кадры + новая аттестация",severity:"normal"},
{match:/ст\.?\s*34/i,title:"По результатам внеочередной аттестации (грубые дефекты)",advice:"⚠ Серьёзное нарушение — нужна консультация",severity:"serious"},
{match:/п\.?\s*1\s*ст\.?\s*33/i,title:"Добровольный отказ (ликвидация / смена деятельности)",advice:"Можно получить новый аттестат",severity:"normal"},
// === Постановление № 252 (исторические записи) — пункт 21 ===
{match:/п\.?\s*21.*абз\.?\s*2|абз\.?\s*2\s*п\.?\s*21/i,title:"Подложные/недостоверные документы при аттестации",advice:"⚠ Серьёзное нарушение — консультация",severity:"serious"},
{match:/п\.?\s*21.*абз\.?\s*3|абз\.?\s*3\s*п\.?\s*21/i,title:"2+ нарушения ТНПА в году (Госстройнадзор/суды)",advice:"⚠ Серьёзное нарушение — консультация",severity:"serious"},
{match:/п\.?\s*21.*абз\.?\s*4|абз\.?\s*4\s*п\.?\s*21/i,title:"2+ отрицательных заключения госэкспертизы в году",advice:"⚠ Серьёзное нарушение — консультация",severity:"serious"},
{match:/п\.?\s*21.*абз\.?\s*5|абз\.?\s*5\s*п\.?\s*21/i,title:"Не предоставили информацию по запросу МАиС",advice:"Можно восстановить через подачу",severity:"normal"},
// === Постановление № 252 — пункт 20 (тоже встречается на сайте) ===
{match:/п\.?\s*20.*абз\.?\s*2|абз\.?\s*2\s*п\.?\s*20/i,title:"Основание по п. 20 абз. 2 постановления № 252",advice:"Уточнить основание у клиента / Белстройцентра",severity:"normal"},
{match:/п\.?\s*20.*абз\.?\s*3|абз\.?\s*3\s*п\.?\s*20/i,title:"Основание по п. 20 абз. 3 постановления № 252",advice:"Уточнить основание у клиента / Белстройцентра",severity:"normal"},
{match:/п\.?\s*20.*абз\.?\s*4|абз\.?\s*4\s*п\.?\s*20/i,title:"Основание по п. 20 абз. 4 постановления № 252",advice:"Уточнить основание у клиента / Белстройцентра",severity:"normal"},
{match:/п\.?\s*20.*абз\.?\s*5|абз\.?\s*5\s*п\.?\s*20/i,title:"Основание по п. 20 абз. 5 постановления № 252",advice:"Уточнить основание у клиента / Белстройцентра",severity:"normal"},
// === Общий fallback ===
{match:/постановления?\s*№?\s*252/i,title:"Основание по Постановлению № 252",advice:"Уточнить точный пункт у клиента",severity:"normal"},
];

function decodeAttoffReason(reasonText){
if(!reasonText||typeof reasonText!=="string")return null;
for(const decoder of ATTOFF_REASON_DECODER){
if(decoder.match.test(reasonText))return decoder;
}
return null;
}

// === RegistryView: раздел поиска по реестрам разрешительных документов ===
function RegistryView({regProxy,setRegProxy,regCards,setRegCards,regHist,setRegHist,setAppMode,CSS}){
const[q,setQ]=useState("");
const[unp,setUnp]=useState("");
const[loading,setLoading]=useState(false);
const[results,setResults]=useState(null);
const[err,setErr]=useState("");
const[tab,setTab]=useState("search"); // search | cards | history | settings
const[searchMode,setSearchMode]=useState("company"); // company | person
// Состояние расширения
const[extReady,setExtReady]=useState(false);
const[extVersion,setExtVersion]=useState(null);
// Фильтр: какие источники показывать в результатах (по умолчанию все кроме spec — он отдельный режим)
const[enabledSrc,setEnabledSrc]=useState(()=>{try{const s=localStorage.getItem("mavis_reg_enabled");return s?JSON.parse(s):REG_SOURCES.filter(s=>s.id!=="spec").map(s=>s.id);}catch(e){return REG_SOURCES.filter(s=>s.id!=="spec").map(s=>s.id);}});
React.useEffect(()=>{try{localStorage.setItem("mavis_reg_enabled",JSON.stringify(enabledSrc))}catch(e){}},[enabledSrc]);
React.useEffect(()=>{
if(searchMode==="person"&&!enabledSrc.includes("spec")){setEnabledSrc(p=>[...p,"spec"])}
if(searchMode==="company"&&enabledSrc.length===0){setEnabledSrc(REG_SOURCES.filter(s=>s.id!=="spec").map(s=>s.id))}
// eslint-disable-next-line
},[searchMode]);

// === Локальная база реестров (загружается с GitHub Pages) ===
// 5 реестров обновляются автоматически раз в сутки через GitHub Actions:
// SPK, OSP, ATT, SPEC, ISO. Лицензии (lic) — через расширение Chrome (SPA с reCAPTCHA)
// По ТЗ — все реестры проверяются «в моменте» через расширение.
// Локальная база — только для ОСП (она обновляется автоматически через GitHub Actions).
const LOCAL_SOURCES=["osp"];
const[localDb,setLocalDb]=useState(()=>{try{const s=localStorage.getItem("mavis_local_db");if(s){const d=JSON.parse(s);const empty={};LOCAL_SOURCES.forEach(k=>empty[k]=d[k]||null);return empty}}catch(e){}const e={};LOCAL_SOURCES.forEach(k=>e[k]=null);return e});
const[dbLoading,setDbLoading]=useState(false);
const[dbErr,setDbErr]=useState("");

const loadLocalDb=async(force=false)=>{
setDbLoading(true);setDbErr("");
const errs=[];
try{
const base=location.origin+location.pathname.replace(/\/[^/]*$/,"/");
const newDb={...localDb};
for(const s of LOCAL_SOURCES){
try{
const url=base+"data/"+s+".json?t="+Date.now();
const r=await fetch(url);
if(!r.ok)throw new Error("HTTP "+r.status);
const d=await r.json();
// Принимаем только если count > 0 (иначе оставляем предыдущую версию из localStorage)
if(d&&d.count>0){
// Защита: если в локальной базе подозрительно много записей (парсер сломался) — обрезаем
if(d.records&&d.records.length>3000){
console.warn("[MAVIS] "+s+" имеет "+d.records.length+" записей — это подозрительно много (парсер мог сломаться). Берём первые 2000.");
d.records=d.records.slice(0,2000);
d.count=2000;
d._truncated=true;
}
newDb[s]=d;console.log("[MAVIS] "+s+" загружен: "+d.count+" записей")
}else{console.log("[MAVIS] "+s+" пустой/недоступен (count=0)")}
}catch(e){console.warn("[MAVIS] не удалось загрузить "+s+":",e.message);errs.push(s+": "+e.message)}
}
setLocalDb(newDb);
try{localStorage.setItem("mavis_local_db",JSON.stringify(newDb))}catch(e){
console.warn("localStorage переполнен — пробуем сжать (без iso, потом без spec)");
// Если не влезло — сохраняем без самых больших баз. localStorage обычно ~5MB
const smaller={...newDb,iso:null};
try{localStorage.setItem("mavis_local_db",JSON.stringify(smaller))}catch(e2){
const minimal={spk:newDb.spk,osp:newDb.osp,att:null,spec:null,iso:null};
try{localStorage.setItem("mavis_local_db",JSON.stringify(minimal))}catch(e3){setDbErr("База слишком большая для localStorage")}
}
}
if(force&&errs.length>0)setDbErr("Ошибки: "+errs.join("; "));
}finally{setDbLoading(false)}
};

// Автоматически загружаем базу при открытии раздела (если хотя бы один источник старше 24ч)
React.useEffect(()=>{
const hasAny=LOCAL_SOURCES.some(s=>localDb[s]&&localDb[s].records&&localDb[s].records.length>0);
const isOld=hasAny&&LOCAL_SOURCES.some(s=>localDb[s]&&Date.now()-new Date(localDb[s].updated_at).getTime()>24*60*60*1000);
if(!hasAny||isOld){loadLocalDb(false)}
// eslint-disable-next-line
},[]);

// === Локальный поиск по базе (моментальный) ===
const searchLocal=(query,source)=>{
const db=localDb[source];
if(!db||!db.records)return null;
const q=query.toLowerCase().trim();
if(!q)return{count:0,results:[],source,source_name:db.source_name,url:db.url,query};
// Ищем по структурированным полям (organization, cert_number), НЕ по raw
// raw-поле содержит склеенные соседние строки таблицы и даёт ложные срабатывания
const matches=db.records.filter(r=>{
const t=((r.organization||"")+" "+(r.cert_number||"")+" "+(r.person||"")).toLowerCase();
return t.includes(q);
}).slice(0,50);
return{count:matches.length,results:matches,source,source_name:db.source_name,url:db.url,query,from_local:true,updated_at:db.updated_at};
};

// === Детекция расширения через postMessage ===
React.useEffect(()=>{
const handler=(ev)=>{
if(ev.source!==window)return;
const m=ev.data;
if(m&&m.type==="MAVIS_EXT_READY"){
setExtReady(true);
setExtVersion(m.version||"?");
}
};
window.addEventListener("message",handler);
// Пингуем расширение через 500мс на случай если оно загрузилось до нас
const pingId=setTimeout(()=>{
const reqId="ping_"+Date.now();
window.postMessage({target:"MAVIS_EXT",action:"PING",requestId:reqId},"*");
const respHandler=(ev)=>{
const m=ev.data;
if(m&&m.type==="MAVIS_EXT_RESPONSE"&&m.requestId===reqId&&m.response?.ok){
setExtReady(true);
setExtVersion(m.response.version||"?");
window.removeEventListener("message",respHandler);
}
};
window.addEventListener("message",respHandler);
setTimeout(()=>window.removeEventListener("message",respHandler),2000);
},500);
return()=>{window.removeEventListener("message",handler);clearTimeout(pingId)};
},[]);

const daysLeft=(iso)=>{if(!iso)return null;const d=new Date(iso);const diff=Math.ceil((d-new Date())/(1000*60*60*24));return diff};

// === Запрос к расширению через postMessage ===
const callExtension=(action,payload,timeoutMs=60000)=>new Promise((resolve,reject)=>{
const reqId=action+"_"+Date.now()+"_"+Math.random().toString(36).slice(2,8);
const t=setTimeout(()=>{window.removeEventListener("message",handler);reject(new Error("Таймаут "+timeoutMs+"мс — расширение не ответило"))},timeoutMs);
const handler=(ev)=>{
if(ev.source!==window)return;
const m=ev.data;
if(m&&m.type==="MAVIS_EXT_RESPONSE"&&m.requestId===reqId){
clearTimeout(t);window.removeEventListener("message",handler);
if(m.response?.ok)resolve(m.response.result);
else reject(new Error(m.response?.error||"Неизвестная ошибка"));
}
};
window.addEventListener("message",handler);
window.postMessage({target:"MAVIS_EXT",action,requestId:reqId,...payload},"*");
});

const search=async()=>{
const qVal=q.trim();
const unpVal=unp.trim();
if(!qVal&&!unpVal){setErr("Введите УНП или название компании");return}
if(qVal&&qVal.length<2&&!unpVal){setErr("Введите минимум 2 символа в названии или УНП");return}
const queryForSearch=qVal||unpVal; // если только УНП — ищем по нему, если только название — по нему
setErr("");setLoading(true);setResults(null);
try{
// По ТЗ: всегда проверяем все 6 источников (включая spec) — это «проверка компании»
// По ТЗ — 8 реестров для проверки компании:
// СПК старый, СПК новый, Аттестаты юр.лиц, Аттестаты отменённые, ISO, Серты металл, ОСП, Лицензии
const sourcesAll=["spk","spk2","att","attoff","iso","metal","osp","lic"];
if(sourcesAll.length===0){setErr("Выберите хотя бы один реестр в фильтре");setLoading(false);return}

// Разделяем: какие источники есть в локальной базе, какие нужно искать через расширение
const localSources=sourcesAll.filter(s=>LOCAL_SOURCES.includes(s)&&localDb[s]&&localDb[s].records);
const extSources=sourcesAll.filter(s=>!localSources.includes(s));

const allResults={query:queryForSearch,unp:unpVal,name:qVal,sources:{}};

// 1) Локальный поиск (моментально)
for(const s of localSources){
const r=searchLocal(queryForSearch,s);
if(r)allResults.sources[s]=r;
}

// 2) Если есть источники для расширения — спрашиваем у него
if(extSources.length>0){
if(!extReady){
// Если расширения нет, но есть локальные данные — показываем что есть, остальные помечаем как недоступные
if(localSources.length===0){setErr("Установите расширение MAVIS Registry в Chrome (инструкция в Настройках)");setTab("settings");setLoading(false);return}
for(const s of extSources){
allResults.sources[s]={count:0,results:[],source:s,error:"Расширение не установлено — этот реестр недоступен. Установите расширение в Настройках."};
}
}else{
try{
const extData=await callExtension("SEARCH",{query:queryForSearch,sources:extSources},120000);
Object.assign(allResults.sources,extData.sources||{});
}catch(e){
// Если расширение упало — помечаем все ext-источники как ошибочные, но локальные оставляем
for(const s of extSources){
allResults.sources[s]={count:0,results:[],source:s,error:"Расширение: "+e.message};
}
}
}
}

// === ФОЛБЭК для СПК нового ===
// Если в СПК новом (spk2) ничего не нашлось / ошибка таймаута — берём данные из СПК старого (spk)
// Это нужно потому что СПК новый недавно создан и туда ещё не все компании перенесены
{
const spkOld=allResults.sources?.spk;
const spkNew=allResults.sources?.spk2;
const oldHasData=spkOld&&!spkOld.error&&spkOld.count>0;
const newHasData=spkNew&&!spkNew.error&&spkNew.count>0;
if(oldHasData&&!newHasData){
// Дублируем результаты из старого, помечаем что взято из старого
allResults.sources.spk2={
...spkNew, // сохраняем url, source_name и т.п.
results:spkOld.results,
count:spkOld.count,
error:null,
_from_old:true, // флаг что данные дублированы из старого
};
}
}

setResults(allResults);
}catch(e){setErr("Ошибка: "+e.message)}
setLoading(false);
};

const saveAsCard=()=>{
if(!results)return;
const card={id:Date.now(),name:q.trim(),docs:[],ts:new Date().toISOString(),notes:""};
// Извлекаем документы из результатов — для всех источников
REG_SOURCES.forEach(s=>{
const src=s.id;
const items=results.sources?.[src]?.results;

}

const{jsPDF}=window.jspdf;
const pdf=new jsPDF("p","mm","a4");
const fillBg=()=>{pdf.setFillColor(250,246,236);pdf.rect(0,0,pageW,pageH,"F")};
fillBg();
// PDF-поля (отступ от края страницы) — этот отступ гарантирует что контент НЕ прижимается к краю PDF
// даже если блок переносится на новую страницу
const padLeft=12; // мм слева
const padRight=12; // мм справа
const padTop=10; // мм сверху
const padBottom=10; // мм снизу
const contentW=pageW-padLeft-padRight; // 186мм
const usableH=pageH-padTop-padBottom;
let y=padTop;

for(const it of items){
const blockH=it.heightMm*(contentW/pageW); // пересчитываем высоту в новом масштабе
// Перенос на новую страницу если не помещается (и блок сам по себе помещается на пустой странице)
if(y>padTop&&y+blockH>pageH-padBottom&&blockH<=usableH){
pdf.addPage();fillBg();y=padTop;
}
// Если блок выше страницы — режем постранично
if(blockH>usableH){
const mmPerPx=blockH/it.canvas.height;
const remainingMm=pageH-padBottom-y;
let sourceY=0;
// Первая порция — кладём то что влезет на текущую страницу
const firstSlicePx=Math.floor(remainingMm/mmPerPx);
if(firstSlicePx>50){
const pc=document.createElement("canvas");
pc.width=it.canvas.width;pc.height=firstSlicePx;
pc.getContext("2d").drawImage(it.canvas,0,0,it.canvas.width,firstSlicePx,0,0,it.canvas.width,firstSlicePx);
const sliceMm=firstSlicePx*mmPerPx;
pdf.addImage(pc.toDataURL("image/jpeg",q.jpeg),"JPEG",padLeft,y,contentW,sliceMm);
y+=sliceMm;sourceY=firstSlicePx;
}
// Дальше — новые страницы
while(sourceY<it.canvas.height){
pdf.addPage();fillBg();y=padTop;
const sliceH=Math.min(Math.floor(usableH/mmPerPx),it.canvas.height-sourceY);
const pc=document.createElement("canvas");
pc.width=it.canvas.width;pc.height=sliceH;
pc.getContext("2d").drawImage(it.canvas,0,sourceY,it.canvas.width,sliceH,0,0,it.canvas.width,sliceH);
const sliceMm=sliceH*mmPerPx;
pdf.addImage(pc.toDataURL("image/jpeg",q.jpeg),"JPEG",padLeft,y,contentW,sliceMm);
y+=sliceMm;
sourceY+=sliceH;
}
}else{
pdf.addImage(it.canvas.toDataURL("image/jpeg",q.jpeg),"JPEG",padLeft,y,contentW,blockH);
y+=blockH;
}
}

return pdf.output("datauristring").split(",")[1];
};

{INIT_MGRS.map((m,i)=><div key={m.id} style={{padding:"12px 16px",background:"var(--s2)",borderRadius:8,marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
<span style={{fontSize:14,fontWeight:700}}>{m.name}</span>
<span style={{fontSize:12,color:"var(--t2)",marginLeft:"auto"}}>Специалист отдела продаж</span>
</div>)}
<div style={{marginTop:12,fontSize:12,color:"var(--t2)"}}>Менеджеры зашиты в приложение. Для изменения обратитесь к разработчику.</div>
</div>
<div className="CD"><div className="CT">💾 Резервная копия истории</div>

<div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
<button className="B BP" onClick={exportHist} disabled={!hi.length}>📥 Экспорт ({hi.length} КП)</button>
<label className="B BS" style={{cursor:"pointer"}}>📤 Импорт<input type="file" accept=".json,application/json" style={{display:"none"}} onChange={e=>{if(e.target.files&&e.target.files[0]){importHist(e.target.files[0]);e.target.value=""}}} /></label>
{hi.length>0&&<button className="B BR" onClick={()=>{if(window.confirm("Удалить ВСЮ историю КП ("+hi.length+" штук)? Это действие нельзя отменить!"))setHi([])}}>🗑 Очистить историю</button>}
</div>
<p style={{fontSize:11,color:"var(--t2)",marginTop:10,fontStyle:"italic"}}>Импорт объединит файл с текущей историей (без дублей по id).</p>
</div>
<div className="CD"><div className="CT">📍 Реквизиты компании</div>
<div className="FG">
<div className="FGR"><span className="FL">Телефон</span><div style={{fontSize:14,color:"var(--tx)",padding:"10px 0"}}>{COMPANY_PHONE}</div></div>
<div className="FGR"><span className="FL">Адрес</span><div style={{fontSize:14,color:"var(--tx)",padding:"10px 0"}}>{COMPANY_ADDR}</div></div>
</div>
</div>
</div></>)}
</div>
</div>
</>);
}
const root=ReactDOM.createRoot(document.getElementById('root'));root.render(React.createElement(App));
