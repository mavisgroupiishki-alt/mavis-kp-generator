    .TR td{font-weight:700;font-size:14px;border-top:2px solid var(--ac)}.GR td{font-weight:800;font-size:16px;color:var(--ac)}
    .KP{background:linear-gradient(135deg,#3a3d4a 0%,#2a2d38 40%,#1e2028 100%);border-radius:8px;padding:48px 40px;color:#fff;position:relative;overflow:hidden;font-family:'Manrope',sans-serif}.KP::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 48%,rgba(255,255,255,.02) 48%,rgba(255,255,255,.02) 52%,transparent 52%);pointer-events:none}
    .KY{position:absolute;top:32px;left:32px;font-size:64px;font-weight:800;writing-mode:vertical-rl;color:rgba(255,255,255,.15);letter-spacing:8px;font-family:'Playfair Display',serif}
    .KH{margin-left:60px;margin-bottom:36px}.KH h1{font-size:28px;font-weight:800;letter-spacing:6px;margin-bottom:4px;font-family:'Playfair Display',serif}.KH h2{font-size:16px;font-weight:300;letter-spacing:12px;color:rgba(255,255,255,.7)}.KH .br2{font-size:13px;font-weight:600;letter-spacing:3px;color:rgba(255,255,255,.5);margin-top:4px}
    .KD{font-size:13px;color:rgba(255,255,255,.5);margin-left:60px;margin-bottom:8px}
    .KC{margin-left:60px;margin-bottom:32px;padding:18px 24px;background:rgba(255,255,255,.06);border-radius:10px;border-left:3px solid var(--ac)}.KC h3{font-size:20px;font-weight:700;margin-bottom:4px}.KC p{font-size:13px;color:rgba(255,255,255,.6)}
    .KS{margin-left:60px;font-size:16px;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.1);font-family:'Playfair Display',serif;letter-spacing:1px}
    .KT{margin-left:60px;width:calc(100% - 60px);border-collapse:collapse;margin-bottom:32px}.KT th{text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.5);padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.15)}.KT td{padding:12px 14px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.06)}.KT .TT td{font-weight:700;font-size:14px;border-top:2px solid rgba(255,255,255,.2);border-bottom:none}.KT .TGr td{font-weight:800;font-size:16px;color:var(--ac);padding-top:16px}
    .KCN{margin-left:60px;font-size:13px;color:rgba(255,255,255,.7);line-height:1.8;margin-bottom:32px}
    .KA{margin-left:60px}.KAI{margin-bottom:16px}.KAI h4{font-size:14px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}.KAI p{font-size:12px;color:rgba(255,255,255,.6);line-height:1.5}
    .KCL{margin-left:60px;display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}.KCLT{padding:6px 16px;border:1px solid rgba(255,255,255,.2);border-radius:20px;font-size:12px;font-weight:600;color:rgba(255,255,255,.7)}
    .HC{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:18px 22px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:16px;margin-bottom:12px}.HC:hover{border-color:var(--ac);transform:translateY(-2px)}
    .AB{display:flex;gap:10px;flex-wrap:wrap;margin-top:24px;padding-top:20px;border-top:1px solid var(--bd)}
    .NF{position:fixed;top:20px;right:20px;z-index:1000;padding:14px 24px;border-radius:10px;font-size:14px;font-weight:600;animation:sIn .3s ease;box-shadow:0 8px 24px rgba(0,0,0,.3)}.NF.success{background:var(--gn);color:#fff}.NF.error{background:var(--rd);color:#fff}.NF.warn{background:var(--or);color:#fff}
    @keyframes sIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
    .ES{text-align:center;padding:60px 20px;color:var(--t2)}.TG2{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;background:rgba(79,125,245,.15);color:var(--ac)}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
  `;

  return (<>
    <style>{CSS}</style>
    {nf&&<div className={"NF "+nf.t}>{nf.m}</div>}
    <div className="A">
      <div className="SB">
        <div className="SL"><h1>MAVIS</h1><span>КП Генератор</span></div>
        <div className="SN">
          <div className={`NI ${pg==="create"?"on":""}`} onClick={()=>setPg("create")}><span className="ic">✦</span> Новое КП</div>
          <div className={`NI ${pg==="history"?"on":""}`} onClick={()=>setPg("history")}><span className="ic">☰</span> История{hi.length>0&&<span className="badge">{hi.length}</span>}</div>
          <div className={`NI ${pg==="settings"?"on":""}`} onClick={()=>setPg("settings")}><span className="ic">⚙</span> Настройки</div>
        </div>
        <div className="SFt">MAVIS GROUP © 2026</div>
      </div>
      <div className="MN">
        {pg==="create"&&(<>
          <div className="MH"><h2>{kn}</h2><button className="B BS Bsm" onClick={nw}>+ Новое КП</button></div>
          <div className="MC">
            <div className="STP">
              <div className={`SI ${st===1?"on":st>1?"ok":""}`} onClick={()=>setSt(1)}><span className="SNM">{st>1?"✓":"1"}</span> Компания</div>
              <div className={`SI ${st===2?"on":st>2?"ok":""}`} onClick={()=>st>1&&setSt(2)}><span className="SNM">{st>2?"✓":"2"}</span> Услуги</div>
              <div className={`SI ${st===3?"on":""}`} onClick={()=>st>2&&setSt(3)}><span className="SNM">3</span> Предпросмотр</div>
            </div>
            {st===1&&(<>
              <div className="CD"><div className="CT">🔍 Поиск в Битрикс24</div>
                <div className="SR"><input className="FI" placeholder="Введите название компании..." value={bq} onChange={e=>setBq(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sBx()} /><button className="B BP" onClick={sBx} disabled={bl}>{bl?"⏳":"Найти"}</button></div>
                {br.length>0&&<div className="BXR">{br.map(c=><div key={c.id} className="BXI" onClick={()=>pBx(c)}><div><div style={{fontWeight:600,fontSize:14}}>{c.name}</div><div style={{fontSize:12,color:"var(--t2)"}}>{c.email}{c.phone?" · "+c.phone:""}</div></div><span style={{fontSize:12,opacity:.5}}>→</span></div>)}</div>}
              </div>
              <div className="CD"><div className="CT">📝 Данные компании {co.bx&&<span className="TG2">Битрикс #{co.bx}</span>}</div>
                <div className="FG">
                  <div className="FGR fu"><span className="FL">Название компании *</span><input className="FI" placeholder='ООО «Название»' value={co.name} onChange={e=>setCo(p=>({...p,name:e.target.value}))} /></div>
                  <div className="FGR"><span className="FL">ФИО директора</span><input className="FI" placeholder="Иванов И.И." value={co.dir} onChange={e=>setCo(p=>({...p,dir:e.target.value}))} /></div>
                  <div className="FGR"><span className="FL">Email</span><input className="FI" type="email" placeholder="info@company.by" value={co.email} onChange={e=>setCo(p=>({...p,email:e.target.value}))} /></div>
                  <div className="FGR"><span className="FL">Телефон</span><input className="FI" placeholder="+375 29 XXX-XX-XX" value={co.phone} onChange={e=>setCo(p=>({...p,phone:e.target.value}))} /></div>
                  <div className="FGR"><span className="FL">Заголовок КП</span><input className="FI" placeholder="Получение аттестата соответствия" value={ttl} onChange={e=>setTtl(e.target.value)} /></div>
                </div>
              </div>
              <div style={{display:"flex",justifyContent:"flex-end"}}><button className="B BP Blg" onClick={()=>{if(!co.name){fl("Укажите компанию","error");return;}setSt(2);}}>Далее: Услуги →</button></div>
            </>)}
            {st===2&&(<>
              <div className="CD"><div className="CT">✏️ Добавить свою услугу</div><div className="SR"><input className="FI" placeholder="Введите название услуги..." value={cn} onChange={e=>setCn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&aC()} /><button className="B BG" onClick={aC}>+ Добавить</button></div></div>
              <div className="CD"><div className="CT">📂 Или выберите из каталога</div>
                {CAT.map(cat=><div key={cat.c} className="CG"><div className={`CH ${ec===cat.c?"op":""}`} onClick={()=>setEc(ec===cat.c?null:cat.c)}><span>{cat.i}</span> {cat.c}<span style={{marginLeft:"auto",fontSize:12,color:"var(--t2)"}}>{cat.s.length}</span><span className="aw">▸</span></div>
                  {ec===cat.c&&<div className="CS">{cat.s.map(s=>{const a=sv.some(x=>x.id===s.id);return <div key={s.id} className="SVI"><div className="SVN">{s.n}</div>{a?<span className="SVA">✓</span>:<button className="B BP Bsm" onClick={()=>aS(s)}>+</button>}</div>;})}</div>}
                </div>)}
              </div>
              {sv.length>0&&<div className="CD"><div className="CT">✅ Выбранные услуги ({sv.length})</div><div style={{overflowX:"auto"}}><table className="TBL"><thead><tr><th style={{width:30}}>№</th><th>Наименование</th><th style={{width:120}}>Подготовка</th><th style={{width:120}}>Пошлины</th><th style={{width:150}}>Доп. расходы</th><th style={{width:40}}></th></tr></thead><tbody>
                {sv.map((s,i)=><tr key={s.id}><td style={{color:"var(--t2)"}}>{i+1}</td><td><input className="FI" style={{width:"100%",background:"transparent",border:"none",padding:0,fontSize:13,color:"var(--tx)"}} value={s.cn||s.n} onChange={e=>uS(s.id,"cn",e.target.value)} /></td><td><input type="number" className="NI2" value={s.prep} onChange={e=>uS(s.id,"prep",+e.target.value)} /></td><td><input type="number" className="NI2" value={s.fee} onChange={e=>uS(s.id,"fee",+e.target.value)} /></td><td><input type="number" className="NI2" value={s.extra} onChange={e=>uS(s.id,"extra",+e.target.value)} /><input className="CIp" placeholder="Комментарий..." value={s.ec||""} onChange={e=>uS(s.id,"ec",e.target.value)} /></td><td><button className="B BR Bsm" onClick={()=>rS(s.id)}>✕</button></td></tr>)}
                <tr className="TR"><td></td><td style={{textAlign:"right"}}>Итого:</td><td>{fm(tP)}</td><td>{fm(tF)}</td><td>{fm(tE)}</td><td></td></tr>
                <tr className="GR"><td></td><td style={{textAlign:"right"}}>ОБЩАЯ СУММА:</td><td colSpan={3}>{fm(tT)}</td><td></td></tr>
              </tbody></table></div></div>}
              <div style={{display:"flex",justifyContent:"space-between"}}><button className="B BS Blg" onClick={()=>setSt(1)}>← Компания</button><button className="B BP Blg" onClick={()=>{if(!sv.length){fl("Добавьте услугу","error");return;}setSt(3);}}>Предпросмотр →</button></div>
            </>)}
            {st===3&&(<>
              <div className="KP" ref={kpRef}>
                <div className="KY">2026</div>
                <div className="KH"><h1>КОММЕРЧЕСКОЕ</h1><h2>ПРЕДЛОЖЕНИЕ</h2><div className="br2">MAVIS GROUP</div></div>
                <div className="KD">Предложение о сотрудничестве от {td()}</div>
                <div className="KC"><h3>{co.name}</h3>{co.dir&&<p>{co.dir}</p>}</div>
                {ttl&&<div className="KS">{ttl}</div>}
                <table className="KT"><thead><tr><th>№</th><th>Услуга</th><th>Подготовка</th><th>Пошлины</th><th>Доп. расходы</th></tr></thead><tbody>
                  {sv.map((s,i)=><tr key={s.id}><td style={{color:"rgba(255,255,255,.4)"}}>{i+1}</td><td>{s.cn||s.n}</td><td>{fm(s.prep)}</td><td>{fm(s.fee)}</td><td>{fm(s.extra)}{s.ec&&<div style={{fontSize:11,color:"rgba(255,255,255,.4)",marginTop:2}}>{s.ec}</div>}</td></tr>)}
                  <tr className="TT"><td></td><td>Итого:</td><td>{fm(tP)}</td><td>{fm(tF)}</td><td>{fm(tE)}</td></tr>
                  <tr className="TGr"><td></td><td>ОБЩАЯ СУММА:</td><td colSpan={3}>{fm(tT)}</td></tr>
                </tbody></table>
                <div className="KCN"><strong>Условия сотрудничества:</strong><br/>— Оплата услуг по подготовке документов — 100% предоплата.<br/>— Гос. пошлина — по мере направления документов в орган.</div>
                <div className="KS">Преимущества работы с нами</div>
                <div className="KA">{ADV.map((a,i)=><div key={i} className="KAI"><h4><span style={{color:"var(--ac)"}}>◆</span> {a.t}</h4><p>{a.d}</p></div>)}</div>
                <div className="KCL">{CL.map(c=><span key={c} className="KCLT">{c}</span>)}</div>
              </div>
              <div className="AB">
                <button className="B BS Blg" onClick={()=>setSt(2)}>← Редактировать</button>
                <button className="B BG Blg" onClick={save}>💾 Сохранить</button>
                <button className="B BP Blg" onClick={sEm} disabled={sn}>{sn?"⏳ Отправка...":"✉ Отправить на "+(co.email||"email")}</button>
                <button className="B BS Blg" onClick={dlPdf} disabled={pdfing}>{pdfing?"⏳ Генерация...":"📄 Скачать PDF"}</button>
              </div>
            </>)}
          </div>
        </>)}
        {pg==="history"&&(<>
          <div className="MH"><h2>История КП</h2></div>
          <div className="MC">
            {!hi.length?<div className="ES"><p style={{fontSize:48,marginBottom:16,opacity:.5}}>📋</p><p>Пока нет сохранённых КП.</p><button className="B BP" style={{marginTop:20}} onClick={nw}>+ Создать</button></div>
            :hi.map(k=><div key={k.id} className="HC" onClick={()=>ld(k)}><div><div style={{fontSize:12,color:"var(--ac)",fontWeight:700}}>{k.kn}</div><div style={{fontSize:15,fontWeight:700}}>{k.co.name}</div><div style={{fontSize:12,color:"var(--t2)"}}>{k.date} · {k.sv.length} услуг</div></div><div style={{marginLeft:"auto",fontSize:16,fontWeight:800,color:"var(--gn)",whiteSpace:"nowrap"}}>{fm(k.tT)}</div></div>)}
          </div>
        </>)}
        {pg==="settings"&&(<>
          <div className="MH"><h2>Настройки</h2></div>
          <div className="MC">
            <div className="CD"><div className="CT">🔗 Битрикс24</div><div style={{padding:"12px 16px",background:"var(--s2)",borderRadius:8,fontSize:13,color:"var(--gn)",fontWeight:600}}>✓ Подключён: mavisgroup.bitrix24.by</div></div>
            <div className="CD"><div className="CT">✉ Email</div><p style={{fontSize:13,color:"var(--t2)",lineHeight:1.6}}>Письма идут через Битрикс24 CRM. Подключите почтовый ящик в Битриксе. Каждое КП видно как активность в карточке.</p></div>
            <div className="CD"><div className="CT">👤 Данные менеджера</div><div className="FG">
              <div className="FGR"><span className="FL">ФИО</span><input className="FI" value={cf.name} onChange={e=>setCf(p=>({...p,name:e.target.value}))} placeholder="Ваше ФИО" /></div>
              <div className="FGR"><span className="FL">Телефон</span><input className="FI" value={cf.phone} onChange={e=>setCf(p=>({...p,phone:e.target.value}))} placeholder="+375..." /></div>
              <div className="FGR"><span className="FL">Email</span><input className="FI" value={cf.email} onChange={e=>setCf(p=>({...p,email:e.target.value}))} placeholder="you@mavisgroup.by" /></div>
            </div></div>
            <button className="B BG Blg" onClick={()=>fl("Сохранено!")}>💾 Сохранить</button>
          </div>
        </>)}
      </div>
    </div>
  </>);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
